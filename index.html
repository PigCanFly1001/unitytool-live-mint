<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UnityTool · Live Mint — realtime NFT mint tracker</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="./src/style.css">
</head>
<body>

<!-- 顶栏 -->
<header class="topbar">
  <div class="brand"><i class="fa-solid fa-satellite-dish"></i> UnityTool <span class="brand-sub">Live Mint</span></div>
  <span id="rpc-status" class="rpc-status"></span>
  <div class="topbar-right">
    <button id="lang-btn" class="btn ghost icon" title="Language"><i class="fa-solid fa-language"></i></button>
    <a id="link-x" class="btn ghost icon" href="https://x.com/pigcanfly1001" target="_blank" rel="noopener" title="Follow on X"><i class="fa-brands fa-x-twitter"></i></a>
    <!-- GitHub: 开源后把 href 换成 repo 地址并移除 hidden -->
    <a id="link-gh" class="btn ghost icon" hidden href="https://github.com/" target="_blank" rel="noopener" title="Star on GitHub"><i class="fa-brands fa-github"></i></a>
    <button id="donate-btn" class="btn ghost icon" title="Donate ETH"><i class="fa-solid fa-heart"></i></button>
    <span class="tb-sep"></span>
    <button id="mode-chip" class="mode-chip mode-http" title="Data source — click to manage RPC"><i class="fa-solid fa-tower-broadcast"></i> HTTP poll</button>
    <button id="prefs-btn" class="btn ghost icon" title="Settings · RPC"><i class="fa-solid fa-gear"></i></button>
    <button id="theme-toggle" class="btn ghost icon" title="Toggle theme"><i class="fa-solid fa-moon"></i></button>
    <button id="scan-toggle" class="btn ghost"><i class="fa-solid fa-play"></i> Resume</button>
    <button id="wallet-btn" class="btn ghost"><i class="fa-solid fa-wallet"></i> Wallet</button>
  </div>
</header>

<!-- 三栏 -->
<main class="layout">
  <!-- 左: 榜单 -->
  <section class="col left">
    <div class="col-head">
      <h3>Signal <span class="live"><i class="fa-solid fa-circle"></i> <span id="rank-count">0</span></span></h3>
    </div>
    <!-- 控制条: 时间窗 chips (左) + 排序下拉 + 设置 (右) 融在同一排 -->
    <div class="rank-ctrl">
      <div class="tabs" id="sort-tabs"></div>
      <div class="rank-ctrl-right">
        <div class="sort-wrap">
          <i class="fa-solid fa-arrow-down-wide-short sort-lead"></i>
          <select class="sort-select" id="sort-select" title="sort by"></select>
          <i class="fa-solid fa-chevron-down sort-caret"></i>
        </div>
        <button class="head-btn" id="open-settings" title="more filters & sorting"><i class="fa-solid fa-sliders"></i></button>
      </div>
    </div>
    <div id="rank-list" class="rank-list"></div>
  </section>

  <!-- 拖拽调整左栏宽度 -->
  <div class="col-resizer" id="resize-left" title="drag to resize"></div>

  <!-- 中: 详情 -->
  <section class="col mid" id="detail">
    <div class="empty">
      <div class="radar-ring"></div>
      <div class="t">Pick a collection to inspect</div>
      <div class="s">Select any NFT from the Signal list or Live Mints to see its stats, mint method, price &amp; art here</div>
    </div>
  </section>

  <!-- 拖拽调整右栏宽度 -->
  <div class="col-resizer" id="resize-right" title="drag to resize"></div>

  <!-- 右: Live 流 + Pending -->
  <section class="col right">
    <div class="col-head"><h3>Live Mints</h3><span class="live"><i class="fa-solid fa-circle"></i> <span id="block-age">—</span></span></div>
    <div id="stream" class="stream"></div>
  </section>
</main>

<div id="toast" class="toast"></div>

<script type="module" src="./src/app.js"></script>
</body>
</html>
